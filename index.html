<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Paint Tool</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="window" id="window">

  <!-- TITLEBAR -->
  <div class="titlebar" id="dragbar">

    <span>glitch.graphics</span>

    <div class="win-buttons">

      <div class="win-left">
        <span class="win-btn">_</span>
        <span class="win-btn">□</span>
      </div>

      <div class="win-right">
        <span class="win-btn close">×</span>
      </div>

    </div>

  </div>

  <!-- MENU -->
  <div class="menu">
    File&nbsp;&nbsp;
    Edit&nbsp;&nbsp;
    View&nbsp;&nbsp;
    Image&nbsp;&nbsp;
    Options&nbsp;&nbsp;
    Help
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOOLBAR -->
    <div class="toolbar">

      <!-- TOOL GRID -->
      <div class="tool-grid">

        <!-- DRIFT -->
        <button id="tool-effect"
                class="tool-cell active"
                data-tool="drift">

          <img src="js/icons/drift.svg"
               class="tool-icon"
               alt="Drift">

        </button>

        <!-- FM -->
        <button class="tool-cell"
                data-tool="fm">

          <img src="js/icons/fm.svg"
               class="tool-icon"
               alt="FM">

        </button>

        <!-- EMPTY -->
        <button class="tool-cell">✦</button>
        <button class="tool-cell">◎</button>
        <button class="tool-cell">△</button>
        <button class="tool-cell">☰</button>
        <button class="tool-cell">◯</button>
        <button class="tool-cell">✚</button>

      </div>

      <!-- TOOL OPTIONS -->
      <div class="tool-options">

        <!-- DRIFT PANEL -->
        <div class="panel active"
             data-panel="drift">

          <div class="effect-settings">

            <label>Speed</label>

            <input type="range"
                   id="speed"
                   min="0.001"
                   max="0.02"
                   step="0.001"
                   value="0.004">

            <label>Smooth</label>

            <input type="range"
                   id="smooth"
                   min="1"
                   max="5"
                   step="0.1"
                   value="2">

            <label>Hue Bias</label>

            <input type="range"
                   id="hueBias"
                   min="-180"
                   max="180"
                   step="1"
                   value="0">

          </div>

          <div class="transport">

            <button id="start"
                    class="transport-btn play"></button>

            <button id="stop"
                    class="transport-btn stop"></button>

          </div>

        </div>

        <!-- FM PANEL -->
        <div class="panel"
             data-panel="fm">

          <div class="fm-layout">

            <!-- KNOBS -->
            <div class="fm-knobs">

              <div class="knob-row">

                <div class="knob"
                     data-knob="freq">

                  <div class="dial"></div>
                  <span>Freq</span>

                </div>

                <div class="knob"
                     data-knob="depth">

                  <div class="dial"></div>
                  <span>Depth</span>

                </div>

              </div>

              <div class="knob-row">

                <div class="knob"
                     data-knob="angle">

                  <div class="dial"></div>
                  <span>Angle</span>

                </div>

                <div class="knob"
                     data-knob="flow">

                  <div class="dial"></div>
                  <span>Flow</span>

                </div>

              </div>

              <div class="knob-row">

                <div class="knob"
                     data-knob="blend">

                  <div class="dial"></div>
                  <span>Blend</span>

                </div>

                <div class="knob"
                     data-knob="colorize">

                  <div class="dial"></div>
                  <span>Color</span>

                </div>

              </div>

            </div>

            <!-- SLIDERS -->
            <div class="fm-slider-box">

              <div class="fm-sliders">

                <div class="v-slider-wrap">

                  <input type="range"
                         id="fmSmooth"
                         class="v-slider"
                         min="0"
                         max="1"
                         step="0.001"
                         value="0.5">

                  <span>Smooth</span>

                </div>

                <div class="v-slider-wrap">

                  <input type="range"
                         id="fmThreshold"
                         class="v-slider"
                         min="0"
                         max="1"
                         step="0.001"
                         value="0.5">

                  <span>Threshold</span>

                </div>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- LEFT BOTTOM -->
    <div class="left-bottom">

      <button id="pickBtn">LOAD</button>

      <button id="record">EXPORT</button>

      <input type="file"
             id="upload"
             accept="image/*">

    </div>

    <!-- CANVAS -->
    <div class="canvas-shell">

      <div class="canvas-area">
        <canvas id="canvas"></canvas>
      </div>

      <div class="scroll-x">
        <span></span>
      </div>

      <div class="scroll-y">
        <span></span>
      </div>

    </div>

  </div>

  <!-- PALETTE -->
  <div class="palette">

    <div class="palette-right">

      <div class="swatches">

        <!-- ROW 1 -->
        <i style="background:#ff00ff"></i>
        <i style="background:#d405ff"></i>
        <i style="background:#8a2eff"></i>
        <i style="background:#c94cff"></i>
        <i style="background:#ff66cc"></i>

        <i style="background:#0033ff"></i>
        <i style="background:#0055ff"></i>
        <i style="background:#0077ff"></i>
        <i style="background:#3399ff"></i>
        <i style="background:#66ccff"></i>

        <i style="background:#00ffcc"></i>
        <i style="background:#00ff66"></i>
        <i style="background:#39ff14"></i>
        <i style="background:#00ff00"></i>
        <i style="background:#66ff33"></i>

        <i style="background:#000"></i>
        <i style="background:#fff"></i>
        <i style="background:#3a3a3a"></i>
        <i style="background:#6a6a6a"></i>
        <i style="background:#b08cc2"></i>
        <i style="background:#d9a3c1"></i>
        <i style="background:#f062b5"></i>
        <i style="background:#6ec1e4"></i>
        <i style="background:#3b3bb3"></i>
        <i style="background:#1a4ed8"></i>

        <!-- ROW 2 -->
        <i style="background:#0044cc"></i>
        <i style="background:#0066ff"></i>
        <i style="background:#0088ff"></i>
        <i style="background:#00aaff"></i>
        <i style="background:#00ccff"></i>

        <i style="background:#00e5ff"></i>
        <i style="background:#00ffff"></i>
        <i style="background:#33ffff"></i>
        <i style="background:#66ffff"></i>
        <i style="background:#99ffff"></i>

        <i style="background:#ffff00"></i>
        <i style="background:#ffcc00"></i>
        <i style="background:#ff9900"></i>
        <i style="background:#ff5500"></i>
        <i style="background:#ff0033"></i>

        <i style="background:#4a6cff"></i>
        <i style="background:#74d4cf"></i>
        <i style="background:#5a2a21"></i>
        <i style="background:#e1a6bb"></i>
        <i style="background:#a87ac2"></i>
        <i style="background:#7a6ccf"></i>
        <i style="background:#5c6fb3"></i>
        <i style="background:#c9b6e3"></i>
        <i style="background:#6fa3d8"></i>
        <i style="background:#63c7c9"></i>

      </div>

    </div>

  </div>

<script type="module" src="js/app.js"></script>

</body>
</html>
