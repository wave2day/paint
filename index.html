<!DOCTYPE html>
<html lang="cs">

<head>

<meta charset="UTF-8">

<title>Paint Tool</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="window" id="window">

  <!-- TITLEBAR -->
  <div class="titlebar" id="dragbar">

    <span>glitch.graphics</span>

    <div class="win-buttons">

      <div class="win-left">
        <span class="win-btn">_</span>
        <span class="win-btn">□</span>
      </div>

      <div class="win-right">
        <span class="win-btn close">×</span>
      </div>

    </div>

  </div>

  <!-- MENU -->
  <div class="menu">

    File&nbsp;&nbsp;
    Edit&nbsp;&nbsp;
    View&nbsp;&nbsp;
    Image&nbsp;&nbsp;
    Options&nbsp;&nbsp;
    Help

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOOLBAR -->
    <div class="toolbar">

      <!-- TOOL GRID -->
      <div class="tool-grid">

        <!-- DRIFT -->
        <button id="tool-effect"
                class="tool-cell active"
                data-tool="drift">

          <img src="js/icons/drift.svg"
               class="tool-icon"
               alt="Drift">

        </button>

        <!-- FM -->
        <button class="tool-cell"
                data-tool="fm">

          <img src="js/icons/fm.svg"
               class="tool-icon"
               alt="FM">

        </button>

        <!-- EMPTY -->
        <button class="tool-cell">✦</button>
        <button class="tool-cell">◎</button>
        <button class="tool-cell">△</button>
        <button class="tool-cell">☰</button>
        <button class="tool-cell">◯</button>
        <button class="tool-cell">✚</button>

      </div>

      <!-- TOOL OPTIONS -->
      <div class="tool-options">

        <!-- FM PANEL -->
        <div class="panel active"
     data-panel="fm">

          <div class="fm-layout">

            <!-- KNOBS -->
            <div class="fm-knobs">

              <div class="knob-row">

                <div class="knob"
                     data-knob="freq">

                  <div class="dial"></div>
                  <span>Freq</span>

                </div>

                <div class="knob"
                     data-knob="depth">

                  <div class="dial"></div>
                  <span>Depth</span>

                </div>

              </div>

              <div class="knob-row">

                <div class="knob"
                     data-knob="angle">

                  <div class="dial"></div>
                  <span>Angle</span>

                </div>

                <div class="knob"
                     data-knob="flow">

                  <div class="dial"></div>
                  <span>Flow</span>

                </div>

              </div>

              <div class="knob-row">

                <div class="knob"
                     data-knob="blend">

                  <div class="dial"></div>
                  <span>Blend</span>

                </div>

                <div class="knob"
                     data-knob="colorize">

                  <div class="dial"></div>
                  <span>Color</span>

                </div>

              </div>

            </div>

            <!-- SLIDERS -->
            <div class="fm-slider-box">

              <div class="fm-sliders">

                <div class="v-slider-wrap">

                  <input type="range"
                         id="fmSmooth"
                         class="v-slider"
                         min="0"
                         max="1"
                         step="0.001"
                         value="0.5">

                  <span>Smooth</span>

                </div>

                <div class="v-slider-wrap">

                  <input type="range"
                         id="fmThreshold"
                         class="v-slider"
                         min="0"
                         max="1"
                         step="0.001"
                         value="0.5">

                  <span>Threshold</span>

                </div>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- LEFT BUTTONS -->
    <div class="left-bottom">

      <button id="pickBtn">LOAD</button>

      <button id="record">EXPORT</button>

      <input type="file"
             id="upload"
             accept="image/*">

    </div>

    <!-- CANVAS -->
    <div class="canvas-shell">

      <div class="canvas-area">
        <canvas id="canvas"></canvas>
      </div>

      <div class="scroll-x">
        <span></span>
      </div>

      <div class="scroll-y">
        <span></span>
      </div>

    </div>

  </div>

  <!-- PALETTE -->
  <div class="palette">

    <div class="palette-right">

      <div class="swatches">
        <i style="visibility:hidden"></i>
      </div>

    </div>

  </div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
