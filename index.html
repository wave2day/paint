<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Paint Tool</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="window" id="window">
  <div class="titlebar" id="dragbar">
    <span>glitch.graphics</span>
    <div class="win-buttons">
      <div class="win-left">
        <span class="win-btn">_</span>
        <span class="win-btn">□</span>
      </div>

      <div class="win-right">
        <span class="win-btn close">×</span>
      </div>
    </div>
  </div>

  <div class="menu">File&nbsp;&nbsp; Edit&nbsp;&nbsp; View&nbsp;&nbsp; Image&nbsp;&nbsp; Options&nbsp;&nbsp; Help</div>

  <div class="main">
    <div class="toolbar">

      <div class="tool-grid">
        <button id="tool-effect" class="tool-cell active" data-tool="drift" style="position:relative; width:100%; height:100%;">
  <svg viewBox="0 0 500 500"
       style="position:absolute; top:50%; left:50%; width:80%; height:80%; transform:translate(-50%,-47%);">
       
    <path d="M 312.9677977824378 247.98593882167802 A 63 63 0 1 1 190.3943237370794 229.59991771487418 L 197.9632985006249 232.19040435425524 A 55 55 0 1 0 304.97188695292186 248.24169262209986 Z" fill="#000"></path>
    
    <path d="M 321.4386310159168 292.2554375030207 A 83 83 0 1 1 198.13829556449286 185.19750303387917 L 203.13701406430079 191.44352683784263 A 75 75 0 1 0 314.5529798336598 288.1826242497175 Z" fill="#000"></path>
    
    <path d="M 296.6968856071285 341.80632262864447 A 103 103 0 1 1 238.81457669673546 147.60914930753438 L 239.6833474387366 155.5618367399589 A 95 95 0 1 0 293.06994303570104 334.67573446331284 Z" fill="#000"></path>
    
    <path d="M 238.2621348660829 372.43864799195546 A 123 123 0 1 1 304.3083338942668 139.6387528630234 L 300.7760845352901 146.81672015648527 A 115 115 0 1 0 239.02557324877668 364.4751586916656 Z" fill="#000"></path>
    
    <path d="M 162.13342452338867 362.820498642813 A 143 143 0 1 1 372.1066834292316 175.5758247481814 L 365.27554030032354 179.73941497205934 A 135 135 0 1 0 167.04903713746484 356.50886235510313 Z" fill="#000"></path>
    
    <path d="M 96.49422216508677 304.8176629499859 A 163 163 0 1 1 412.97138216593964 253.05427486046287 L 404.9727867222125 252.90437179982666 A 155 155 0 1 0 104.02824807109477 302.12722550458784 Z" fill="#000"></path>

  </svg>
</button>
<button class="tool-cell" data-tool="fm" style="position:relative; width:100%; height:100%;">

  <svg viewBox="0 0 500 500"
       style="position:absolute; top:50%; left:50%; width:68%; height:68%; transform:translate(-50%,-48%);">

    <g transform="translate(163, 0)">
      <circle cx="87" cy="250" r="163" stroke="black" stroke-width="8" fill="none" />
      <circle cx="107" cy="250" r="143" stroke="black" stroke-width="8" fill="none" />
      <circle cx="127" cy="250" r="123" stroke="black" stroke-width="8" fill="none" />
      <circle cx="147" cy="250" r="103" stroke="black" stroke-width="8" fill="none" />
      <circle cx="167" cy="250" r="83" stroke="black" stroke-width="8" fill="none" />
    </g>

  </svg>

</button>
        <button class="tool-cell">✦</button>
        <button class="tool-cell">◎</button>
        <button class="tool-cell">△</button>
        <button class="tool-cell">☰</button>
        <button class="tool-cell">◯</button>
        <button class="tool-cell">✚</button>
      </div>


<div class="tool-options">

  <!-- 🔥 DRIFT PANEL -->
  <div class="panel active" data-panel="drift">

    <div class="effect-settings">
      <label>Speed</label>
      <input type="range" id="speed" min="0.001" max="0.02" step="0.001" value="0.004">

      <label>Smooth</label>
      <input type="range" id="smooth" min="1" max="5" step="0.1" value="2">

      <label>Hue Bias</label>
      <input type="range" id="hueBias" min="-180" max="180" step="1" value="0">
    </div>

    <div class="transport">
      <button id="start" class="transport-btn play"></button>
      <button id="stop" class="transport-btn stop"></button>
    </div>

  </div>

  <!-- 🔥 FM PANEL -->
  <div class="panel" data-panel="fm">

    <div class="fm-layout">

      <!-- KNOBS -->
      <div class="fm-knobs">

        <div class="knob-row">

          <div class="knob" data-knob="freq">
            <div class="dial"></div>
            <span>Freq</span>
          </div>

          <div class="knob" data-knob="depth">
            <div class="dial"></div>
            <span>Depth</span>
          </div>

        </div>

        <div class="knob-row">

          <div class="knob" data-knob="angle">
            <div class="dial"></div>
            <span>Angle</span>
          </div>

          <div class="knob" data-knob="flow">
            <div class="dial"></div>
            <span>Flow</span>
          </div>

        </div>

        <div class="knob-row">

          <div class="knob" data-knob="blend">
            <div class="dial"></div>
            <span>Blend</span>
          </div>

          <div class="knob" data-knob="colorize">
            <div class="dial"></div>
            <span>Color</span>
          </div>

        </div>

      </div>

      <!-- SLIDER BOX -->
      <div class="fm-slider-box">

        <div class="fm-sliders">

          <div class="v-slider-wrap">
            <input type="range"
                   id="fmSmooth"
                   class="v-slider"
                   min="0"
                   max="1"
                   step="0.001"
                   value="0.5">
            <span>Smooth</span>
          </div>

          <div class="v-slider-wrap">
            <input type="range"
                   id="fmThreshold"
                   class="v-slider"
                   min="0"
                   max="1"
                   step="0.001"
                   value="0.5">
            <span>Threshold</span>
          </div>

        </div>

      </div>

    </div>

  </div>

</div>

    </div>

    <!-- 🔥 TLAČÍTKA MIMO TOOLBAR -->
    <div class="left-bottom">
      <button id="pickBtn">LOAD</button>
      <button id="record">EXPORT</button>
      <input type="file" id="upload" accept="image/*">
    </div>
    <div class="canvas-shell">
      <div class="canvas-area">
        <canvas id="canvas"></canvas>
      </div>
      <div class="scroll-x"><span></span></div>
      <div class="scroll-y"><span></span></div>
    </div>
  </div>

  <!-- 🔥 PALETA = BEZE ZMĚNY -->
  <div class="palette">
    <div class="palette-right">

      <div class="swatches">

  <!-- 🔵 ŘADA 1 (25) -->
  <i style="background:#ff00ff"></i>
  <i style="background:#d405ff"></i>
  <i style="background:#8a2eff"></i>
  <i style="background:#c94cff"></i>
  <i style="background:#ff66cc"></i>

  <i style="background:#0033ff"></i>
  <i style="background:#0055ff"></i>
  <i style="background:#0077ff"></i>
  <i style="background:#3399ff"></i>
  <i style="background:#66ccff"></i>

  <i style="background:#00ffcc"></i>
  <i style="background:#00ff66"></i>
  <i style="background:#39ff14"></i>
  <i style="background:#00ff00"></i>
  <i style="background:#66ff33"></i>

  <i style="background:#000"></i>
  <i style="background:#fff"></i>
  <i style="background:#3a3a3a"></i>
  <i style="background:#6a6a6a"></i>
  <i style="background:#b08cc2"></i>
  <i style="background:#d9a3c1"></i>
  <i style="background:#f062b5"></i>
  <i style="background:#6ec1e4"></i>
  <i style="background:#3b3bb3"></i>
  <i style="background:#1a4ed8"></i>

  <!-- 🔵 ŘADA 2 -->
  <i style="background:#0044cc"></i>
  <i style="background:#0066ff"></i>
  <i style="background:#0088ff"></i>
  <i style="background:#00aaff"></i>
  <i style="background:#00ccff"></i>

  <i style="background:#00e5ff"></i>
  <i style="background:#00ffff"></i>
  <i style="background:#33ffff"></i>
  <i style="background:#66ffff"></i>
  <i style="background:#99ffff"></i>

  <i style="background:#ffff00"></i>
  <i style="background:#ffcc00"></i>
  <i style="background:#ff9900"></i>
  <i style="background:#ff5500"></i>
  <i style="background:#ff0033"></i>

  <i style="background:#4a6cff"></i>
  <i style="background:#74d4cf"></i>
  <i style="background:#5a2a21"></i>
  <i style="background:#e1a6bb"></i>
  <i style="background:#a87ac2"></i>
  <i style="background:#7a6ccf"></i>
  <i style="background:#5c6fb3"></i>
  <i style="background:#c9b6e3"></i>
  <i style="background:#6fa3d8"></i>
  <i style="background:#63c7c9"></i>

      </div>
    </div>
  </div>

<script type="module" src="js/app.js"></script>
</body>
</html>
